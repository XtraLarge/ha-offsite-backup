name: Validate Add-on

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Add-on config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Add-on
        uses: frenck/action-addon-linter@v2
        with:
          path: ./offsite-backup

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./offsite-backup/scripts
          severity: warning

  schema-migration:
    name: Schema-Migration-Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags & History für den Baseline-Vergleich
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Check schema migration
        run: python3 tests/check_schema_migration.py --git

  upgrade-boot-test:
    name: Upgrade-/Boot-Test (Offsite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags & History für das Baseline-Image
      - name: Determine previous release tag
        id: base
        run: |
          tag=$(git tag --list 'offsite-v*' --sort=-version:refname | head -1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          [ -n "$tag" ] && echo "Baseline-Tag: $tag" || echo "Kein offsite-v* Tag — Test wird übersprungen."
      - name: Build candidate image
        if: steps.base.outputs.tag != ''
        run: |
          docker build --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm \
            -t offsite:new offsite-backup
      - name: Build previous release image
        if: steps.base.outputs.tag != ''
        run: |
          git worktree add /tmp/old-release "${{ steps.base.outputs.tag }}"
          docker build --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm \
            -t offsite:old /tmp/old-release/offsite-backup
      - name: Run upgrade/boot test
        if: steps.base.outputs.tag != ''
        run: bash tests/upgrade_boot_test.sh offsite:old offsite:new

  leak-guard:
    name: Leak-Guard (interne Namen/Keys/Secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run leak-guard (nur getrackte Dateien)
        run: bash scripts/naming-guard.sh

  unit-tests:
    name: Unit-Tests (Offsite + Recovery)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Python-Tests (classify_state, smoke, oom/permanent-fail)
        run: |
          python3 tests/classify_state_test.py
          python3 tests/smoke_test.py
          python3 tests/permanent_fail_test.py
      - name: Shell-Tests (rsync-Haertung, Status-Quelle)
        run: |
          bash tests/rsync_chmod_test.sh
          bash tests/status_source_test.sh
