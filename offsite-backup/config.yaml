name: Offsite Backup
version: "1.2.40"
slug: offsite_backup
description: Offsite Backup via rsync + ZFS Snapshot auf externen Storage-Host mit BackupPC-Recovery direkt auf Home Assistant.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false

options:
  zfs_storage_host: ""
  zfs_storage_user: "root"
  offsite_user: ""
  offsite_host: ""
  offsite_port: 23
  offsite_box_id: 0
  backup_schedule: "0 20 * * 3"
  loki_url: ""
  mqtt_discovery: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_storage: ""
  ssh_key_offsite: ""
  offsite_token: ""
  backuppc_port: 8080

schema:
  zfs_storage_host: str
  zfs_storage_user: str
  offsite_user: str
  offsite_host: str
  offsite_port: int
  offsite_box_id: int
  backup_schedule: str
  loki_url: str
  mqtt_discovery: bool
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  ssh_key_storage: password
  ssh_key_offsite: password
  offsite_token: password
  backuppc_port: int

docker_api: true
hassio_api: true
homeassistant_api: true
hassio_role: manager

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8099/tcp: null

ingress: true
ingress_port: 8099
panel_icon: mdi:cloud-upload
panel_title: Offsite Backup
