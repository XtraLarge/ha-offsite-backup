name: Offsite Backup
version: "1.3.3"
slug: offsite_backup
description: Offsite Backup via rsync + ZFS Snapshot auf externen Storage-Host mit BackupPC-Recovery direkt auf Home Assistant.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - aarch64
  - amd64
init: false

options:
  zfs_storage_host: ""
  zfs_storage_user: "root"
  offsite_user: ""
  offsite_host: ""
  offsite_port: 23
  offsite_box_id: 0
  backup_schedule: "0 20 * * 3"
  loki_url: ""
  mqtt_discovery: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_storage: ""
  ssh_key_offsite: ""
  offsite_token: ""
  backuppc_port: 8080
  offsite_path: "/home"
  snapshot_prefix: "pre_rsync"
  backup_sources:
    - dest: "ZPool/BackupPC"
      dataset: "ZPool/BackupPC"
      path: ""
      snapshot: true
      parallel: true
      recovery: "topdir"
      container_mount: "/data/backuppc"
      recovery_clean: false
    - dest: "ZPool/Docker/backuppc/config"
      dataset: ""
      path: "/ZPool/Docker/backuppc/config"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/etc/backuppc"
      recovery_clean: true
    - dest: "ZPool/Docker/backuppc/home"
      dataset: ""
      path: "/ZPool/Docker/backuppc/home"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/home/backuppc"
      recovery_clean: false
    - dest: "ZPool/Docker/backuppc/ssh_config"
      dataset: ""
      path: "/ZPool/Docker/backuppc/ssh_config"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/etc/ssh/ssh_config"
      recovery_clean: false
    - dest: "ZPool/Docker/_DockerCreate"
      dataset: ""
      path: "/ZPool/Docker/_DockerCreate"
      snapshot: false
      parallel: false
      recovery: "none"
      container_mount: ""
      recovery_clean: false

schema:
  zfs_storage_host: str
  zfs_storage_user: str
  offsite_user: str
  offsite_host: str
  offsite_port: int
  offsite_box_id: int
  backup_schedule: str
  loki_url: str
  mqtt_discovery: bool
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  ssh_key_storage: password
  ssh_key_offsite: password
  offsite_token: password
  backuppc_port: int
  offsite_path: str
  snapshot_prefix: str
  backup_sources:
    - dest: str
      dataset: str?
      path: str?
      snapshot: bool
      parallel: bool
      recovery: str?
      container_mount: str?
      recovery_clean: bool?

docker_api: true
hassio_api: true
homeassistant_api: true
hassio_role: manager

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8099/tcp: null

ingress: true
panel_icon: mdi:cloud-upload
panel_title: Offsite Backup
