name: Offsite Backup
version: "1.2.12"
slug: offsite_backup
description: Offsite Backup via Hetzner Storage Box (rsync + ZFS Snapshot) mit BackupPC-Recovery direkt auf Home Assistant.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false

options:
  nas_host: ""
  nas_user: "root"
  hetzner_user: ""
  hetzner_host: ""
  hetzner_port: 23
  hetzner_box_id: 0
  backup_schedule: "0 20 * * 3"
  loki_url: ""
  recovery_target: "local"
  mqtt_discovery: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_nas: ""
  ssh_key_hetzner: ""
  ssh_key_recovery: ""
  hetzner_token: ""

schema:
  nas_host: str
  nas_user: str
  hetzner_user: str
  hetzner_host: str
  hetzner_port: int
  hetzner_box_id: int
  backup_schedule: str
  loki_url: str
  recovery_target: str
  mqtt_discovery: bool
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  ssh_key_nas: password
  ssh_key_hetzner: password
  ssh_key_recovery: password
  hetzner_token: password

docker_api: true
hassio_api: true

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8099/tcp: null

ingress: true
ingress_port: 8099
panel_icon: mdi:cloud-upload
panel_title: Offsite Backup
