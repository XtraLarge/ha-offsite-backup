name: Offsite Backup
version: "1.0.0"
slug: offsite_backup
description: >
  Offsite Backup via Hetzner Storage Box (rsync + ZFS Snapshot).
  Ersetzt rsyncos. Unterstützt BackupPC-Recovery direkt auf Home Assistant (lokal) oder per SSH auf einem Remote-Docker-Host.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false

options:
  nas_host: ""
  nas_user: "root"
  hetzner_user: ""
  hetzner_host: ""
  hetzner_port: 23
  hetzner_box_id: 0
  backup_schedule: "0 20 * * 3"
  loki_url: ""
  recovery_target: "local"

schema:
  nas_host: str
  nas_user: str
  hetzner_user: str
  hetzner_host: str
  hetzner_port: int
  hetzner_box_id: int
  backup_schedule: str
  loki_url: str
  # "local" → BackupPC via Docker-Socket auf HA-RPi
  # IP/Hostname → SSH zu Remote-Docker-Host
  recovery_target: str

# Docker-Socket für lokale Recovery (BackupPC-Container starten)
docker_api: true

# /dev/fuse für SSHFS (Hetzner-Mount in Recovery)
devices:
  - /dev/fuse

map:
  - ssl:false

ports:
  8099/tcp: null

ingress: true
ingress_port: 8099
panel_icon: mdi:cloud-upload
panel_title: Offsite Backup
