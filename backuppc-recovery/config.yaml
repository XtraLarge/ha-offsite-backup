name: BackupPC Recovery
version: "2.0.10"
slug: backuppc_recovery
description: BackupPC4 Recovery-Umgebung via Offsite Storage Box (SSHFS). Nur bei Bedarf starten.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - amd64
  - aarch64
init: false

options:
  offsite_user: ""
  offsite_host: ""
  offsite_port: 23
  snapshot_name: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_offsite: ""

schema:
  offsite_user: str
  offsite_host: str
  offsite_port: int
  snapshot_name: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  ssh_key_offsite: password

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8080/tcp: 8080

panel_icon: mdi:hospital-box
panel_title: BackupPC Recovery
