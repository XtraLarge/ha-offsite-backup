name: BackupPC Recovery
version: "1.0.7"
slug: backuppc_recovery
description: BackupPC4 Recovery-Umgebung via Hetzner Storage Box (SSHFS). Nur bei Bedarf starten.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false

options:
  hetzner_user: ""
  hetzner_host: ""
  hetzner_port: 23
  snapshot_name: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_hetzner: ""

schema:
  hetzner_user: str
  hetzner_host: str
  hetzner_port: int
  snapshot_name: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  ssh_key_hetzner: password

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8900/tcp: 8900

panel_icon: mdi:hospital-box
panel_title: BackupPC Recovery
