name: BackupPC Recovery
version: "2.2.0"
slug: backuppc_recovery
description: BackupPC4 Recovery-Umgebung via Offsite Storage Box (SSHFS). Nur bei Bedarf starten.
url: https://github.com/XtraLarge/ha-offsite-backup
arch:
  - amd64
  - aarch64
init: false

options:
  offsite_user: ""
  offsite_host: ""
  offsite_port: 23
  snapshot_name: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ssh_key_offsite: ""
  offsite_path: "/home"
  backup_sources:
    - dest: "ZPool/BackupPC"
      dataset: "ZPool/BackupPC"
      path: ""
      snapshot: true
      parallel: true
      recovery: "topdir"
      container_mount: "/data/backuppc"
      recovery_clean: false
    - dest: "ZPool/Docker/backuppc/config"
      dataset: ""
      path: "/ZPool/Docker/backuppc/config"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/etc/backuppc"
      recovery_clean: true
    - dest: "ZPool/Docker/backuppc/home"
      dataset: ""
      path: "/ZPool/Docker/backuppc/home"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/home/backuppc"
      recovery_clean: false
    - dest: "ZPool/Docker/backuppc/ssh_config"
      dataset: ""
      path: "/ZPool/Docker/backuppc/ssh_config"
      snapshot: false
      parallel: false
      recovery: "import"
      container_mount: "/etc/ssh/ssh_config"
      recovery_clean: false
    - dest: "ZPool/Docker/_DockerCreate"
      dataset: ""
      path: "/ZPool/Docker/_DockerCreate"
      snapshot: false
      parallel: false
      recovery: "none"
      container_mount: ""
      recovery_clean: false

schema:
  offsite_user: str
  offsite_host: str
  offsite_port: int
  snapshot_name: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  ssh_key_offsite: password
  offsite_path: str
  backup_sources:
    - dest: str
      dataset: str?
      path: str?
      snapshot: bool
      parallel: bool
      recovery: str?
      container_mount: str?
      recovery_clean: bool?

privileged:
  - SYS_ADMIN

apparmor: false

devices:
  - /dev/fuse

ports:
  8080/tcp: 8080

panel_icon: mdi:hospital-box
panel_title: BackupPC Recovery
